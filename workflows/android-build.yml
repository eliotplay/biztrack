name: Build Android APK

on:
  push:
    branches: [ main, master ] # Triggers automatically on code push
  workflow_dispatch:          # Forces a manual "Run workflow" button in the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Web Dependencies & Build React
      run: |
        npm install
        npm run build

    - name: Setup Java Development Kit (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK Tools
      uses: android-actions/setup-android@v3

    - name: Initialize and Sync Capacitor
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "My App" "com.example.myapp" --web-dir=dist
        npx cap add android
        npx cap sync

    - name: Compile the APK File
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK as Downloadable Asset
      uses: actions/upload-artifact@v4
      with:
        name: my-react-android-app
        path: android/app/build/outputs/apk/debug/app-debug.apk
