name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Web Dependencies & Build React
      run: |
        npm install
        npm run build

    # NEW STEP: This auto-detects if your project uses 'dist' or 'build'
    - name: Detect Web Directory & Sync Capacitor
      run: |
        WEB_DIR="dist"
        if [ -d "build" ]; then
          WEB_DIR="build"
        elif [ -d "public" ] && [ ! -d "dist" ]; then
          WEB_DIR="public"
        fi
        echo "Detected web directory: $WEB_DIR"
        
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "My App" "com.example.myapp" --web-dir=$WEB_DIR
        npx cap add android || true # Prevents crashing if folder already exists
        npx cap sync

    - name: Compile the APK File
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK as Downloadable Asset
      uses: actions/upload-artifact@v4
      with:
        name: my-react-android-app
        path: android/app/build/outputs/apk/debug/app-debug.apk
