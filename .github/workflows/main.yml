name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Web Dependencies & Build React
      run: |
        npm install
        npm run build --if-present # --if-present prevents crashing if 'build' script is missing

    # NEW DIAGNOSTIC STEP: Inspects what files actually exist after building
    - name: Debug and Find HTML Location
      run: |
        echo "=== Current Root Directory Contents ==="
        ls -la
        echo "=== Searching for index.html location ==="
        find . -name "index.html" -not -path "*/node_modules/*"

    - name: Detect Web Directory & Sync Capacitor
      run: |
        # Default fallback
        WEB_DIR="dist"
        
        # Check standard locations
        if [ -d "dist" ]; then
          WEB_DIR="dist"
        elif [ -d "build" ]; then
          WEB_DIR="build"
        elif [ -d "out" ]; then
          WEB_DIR="out"
        elif [ -d "public" ]; then
          WEB_DIR="public"
        fi
        
        echo "Capacitor will use web directory: $WEB_DIR"
        
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "My App" "com.example.myapp" --web-dir=$WEB_DIR
        npx cap add android || true
        npx cap sync

    - name: Compile the APK File
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK as Downloadable Asset
      uses: actions/upload-artifact@v4
      with:
        name: my-react-android-app
        path: android/app/build/outputs/apk/debug/app-debug.apk
