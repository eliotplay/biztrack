name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # Step 1: Tell TanStack / Nitro to build purely static single-page assets
    - name: Install Web Dependencies & Build React App
      run: |
        npm install
        npm run build
      env:
        NITRO_PRESET: static

    - name: Setup Java Development Kit (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Android SDK Tools
      uses: android-actions/setup-android@v3

    # Step 2: Ensure the target directory exists and configure Capacitor cleanly
    - name: Setup and Sync Capacitor
      run: |
        # Force create the directory that Capacitor checks
        mkdir -p .output/public
        
        # If TanStack built into 'dist' instead, move files to the expected location
        if [ -d "dist" ] && [ ! -f ".output/public/index.html" ]; then
          cp -r dist/* .output/public/ || true
        fi
        
        # Fallback dummy file ONLY if TanStack didn't generate an index.html anywhere
        if [ ! -f ".output/public/index.html" ]; then
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>BizTrack</title></head><body><div id="root">Fallback UI: Build Assets Missing</div></body></html>' > .output/public/index.html
        fi

        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "BizTrack" "com.example.biztrack" --web-dir=.output/public
        npx cap add android || true
        npx cap sync

    - name: Compile the APK File
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK as Downloadable Asset
      uses: actions/upload-artifact@v4
      with:
        name: my-react-android-app
        path: android/app/build/outputs/apk/debug/app-debug.apk
