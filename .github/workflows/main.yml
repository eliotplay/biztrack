name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # Step 1: Force Lovable/TanStack to bundle client assets and safely allow the server pipeline to bypass
    - name: Install Web Dependencies & Build Frontend
      run: |
        npm install
        npm run build
      continue-on-error: true

    - name: Setup Java Development Kit (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Android SDK Tools
      uses: android-actions/setup-android@v3

    # Step 2: Inject the generated client-side chunks directly into the APK web directory
    - name: Configure Standalone Assets for Capacitor
      run: |
        # Ensure our target asset directory exists
        mkdir -p dist/client
        
        # Pull the main generated asset javascript chunk out of the Lovable build directory
        MAIN_JS=$(find dist/client/assets -name "index-*.js" -type f -exec basename {} \;)
        MAIN_CSS=$(find dist/client/assets -name "styles-*.css" -type f -exec basename {} \;)
        
        echo "Found Lovable Client Bundle Core: $MAIN_JS"
        
        # Overwrite index.html with a direct client-injection script to fix the black screen
        cat <<EOF > dist/client/index.html
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <title>BizTrack</title>
            <link rel="stylesheet" href="./assets/$MAIN_CSS">
        </head>
        <body>
            <div id="root"></div>
            <script type="module" src="./assets/$MAIN_JS"></script>
        </body>
        </html>
        EOF

        # Step 3: Run Capacitor initialization with the standalone folder configurations
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "BizTrack" "com.example.biztrack" --web-dir=dist/client
        npx cap add android || true
        npx cap sync

    - name: Compile the APK File
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK as Downloadable Asset
      uses: actions/upload-artifact@v4
      with:
        name: my-react-android-app
        path: android/app/build/outputs/apk/debug/app-debug.apk
