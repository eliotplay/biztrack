name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # FIX: Swaps the build instruction in package.json to avoid Vinxi's server compilation step
    - name: Install Web Dependencies & Build Static Frontend
      run: |
        npm install
        node -e "
        const fs = require('fs');
        const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
        pkg.scripts.build = 'vite build';
        fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
        "
        npm run build

    - name: Setup Java Development Kit (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Android SDK Tools
      uses: android-actions/setup-android@v3

    # Directs Capacitor straight to the compiled static files
    - name: Setup and Sync Capacitor
      run: |
        # Ensure the web assets directory exists
        mkdir -p dist/client
        
        # Fallback index.html check so Capacitor never throws a missing directory error
        if [ ! -f "dist/client/index.html" ] && [ -f "dist/index.html" ]; then
          cp dist/index.html dist/client/index.html || true
        elif [ ! -f "dist/client/index.html" ]; then
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BizTrack</title></head><body><div id="root"></div></body></html>' > dist/client/index.html
        fi

        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "BizTrack" "com.example.biztrack" --web-dir=dist/client
        npx cap add android || true
        npx cap sync

    - name: Compile the APK File
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK as Downloadable Asset
      uses: actions/upload-artifact@v4
      with:
        name: my-react-android-app
        path: android/app/build/outputs/apk/debug/app-debug.apk
