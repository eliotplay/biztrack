name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # FIX 1: Upgraded Node version to 22 to satisfy TanStack Start's requirements
    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Web Dependencies & Build React
      run: |
        npm install
        npm run build

    # FIX 2: Configured Capacitor to look inside the TanStack production directory (.output/public)
    - name: Setup and Sync Capacitor
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "BizTrack" "com.example.biztrack" --web-dir=.output/public
        npx cap add android || true
        npx cap sync

    - name: Compile the APK File
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK as Downloadable Asset
      uses: actions/upload-artifact@v4
      with:
        name: my-react-android-app
        path: android/app/build/outputs/apk/debug/app-debug.apk
