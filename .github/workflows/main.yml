name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # FIX 1: Compile ONLY the client-side environment assets, completely skipping the broken SSR/Nitro compilation step
    - name: Install Web Dependencies & Build React Client
      run: |
        npm install
        npx vite build --environment client

    # Ensure Java matches the native platform constraints
    - name: Setup Java Development Kit (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Android SDK Tools
      uses: android-actions/setup-android@v3

    # FIX 2: Create a reliable fallback structure and route Capacitor to 'dist/client'
    - name: Setup and Sync Capacitor
      run: |
        # Ensure the generated client directory exists safely
        mkdir -p dist/client
        
        # Create a reliable fallback index entry point inside the asset path if missing
        if [ ! -f "dist/client/index.html" ]; then
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BizTrack</title></head><body><div id="root"></div><script type="module" src="/src/main.tsx"></script></body></html>' > dist/client/index.html
        fi

        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "BizTrack" "com.example.biztrack" --web-dir=dist/client
        npx cap add android || true
        npx cap sync

    - name: Compile the APK File
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK as Downloadable Asset
      uses: actions/upload-artifact@v4
      with:
        name: my-react-android-app
        path: android/app/build/outputs/apk/debug/app-debug.apk
